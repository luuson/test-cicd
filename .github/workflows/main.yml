name: CI CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SV_IP }}
          username: ec2-user
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/ec2-user
            if [ ! -d "crypto-dashboard"  ]; then
              git clone https://github.com/luuson/test-cicd.git crypto-dashboard
            else
              cd crypto-dashboard
              git pull

            fi
            docker compose down
            docker compose up -d --build